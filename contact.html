  <main class="main">
    <div class="dept-chat">
      <div class="chat-header">
        <h3>SCMS Department Communication</h3>
        <p>Staff ↔ Department Managers Messaging System</p>
      </div>

      <div class="dept-tabs">
        <button class="dept-btn active" data-dept="library">Library</button>
        <button class="dept-btn" data-dept="cafe">Cafe</button>
        <button class="dept-btn" data-dept="dorm">Dormitory</button>
        <button class="dept-btn" data-dept="registrar">Registrar</button>
      </div>

      <div class="chat-box" id="chat-box"></div>

      <div class="chat-input">
        <input type="text" id="chat-input" placeholder="Message department...">
        <button id="send-btn">Send</button>
      </div>
    </div>
  </main>

  <div id="logout-modal" class="modal hidden logout-modal">
    <div class="modal-content logout-box">

      <h4>Logout Confirmation</h4>

      <p>Are you sure you want to logout?</p>

      <div class="logout-actions">
        <button id="confirm-logout" class="logout-confirm">Logout</button>
        <button id="cancel-logout" class="logout-cancel">Cancel</button>
      </div>

    </div>
